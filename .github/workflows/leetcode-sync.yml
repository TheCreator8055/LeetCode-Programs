name: LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sync LeetCode submissions
        uses: joshcai/leetcode-sync@v1.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          leetcode-session: ${{ secrets.LEETCODE_SESSION }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Organize problems
        run: python .github/scripts/organize.py

      - name: Update README
        run: python .github/scripts/update_readme.py

      - name: Commit organized repo
        run: |
            git config --global user.name "leetcode-bot"
            git config --global user.email "actions@github.com"
        
            git pull origin main --rebase
        
            git add .
            git commit -m "Organize LeetCode solutions" || echo "No changes"
        
            git push origin main || echo "Nothing to push"

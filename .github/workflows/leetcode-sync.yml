name: LeetCode Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Fetch LeetCode submissions
        run: python fetch_leetcode.py

      - name: Organize problems
        run: python organize.py

      - name: Update README
        run: python update_readme.py

      - name: Commit changes
        run: |
          git config --global user.name "leetcode-bot"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto sync LeetCode solutions" || echo "No changes"
          git push
